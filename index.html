<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        /* 印刷設定: ヘッダー・フッター（日付やURL）を消す */
        @page {
            size: A5 landscape;
            margin: 0; 
        }
        
        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            margin: 0;
            padding: 10mm;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            width: 190mm;
            height: auto;
        }

        [contenteditable="true"] {
            outline: 1px dashed #ccc;
        }

        h1 {
            font-size: 18pt;
            margin: 0 0 3mm 0;
        }

        .info {
            font-size: 12pt;
            margin-bottom: 3mm;
        }

        table {
            border-collapse: collapse;
            width: 100%;
        }

        th, td {
            border: 1.5pt solid #000;
            padding: 6pt;
            font-size: 13pt;
            text-align: center;
        }

        th {
            background-color: #eee;
        }

        .keisho {
            width: 100%;
            text-align: right;
            font-size: 9pt;
            margin-top: 2mm;
        }

        .contact {
            width: 100%;
            margin-top: 4mm;
            font-size: 11pt;
            border: 1pt solid #000;
            padding: 3mm;
            box-sizing: border-box;
        }

        /* 操作パネル（印刷時には非表示） */
        .controls {
            margin-bottom: 5mm;
            padding: 5mm;
            background: #f9f9f9;
            border: 1px solid #ccc;
            border-radius: 5px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .print-btn {
            padding: 2mm 6mm;
            font-size: 10pt;
            cursor: pointer;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
        }

        @media print {
            .controls {
                display: none;
            }
            [contenteditable="true"] {
                outline: none;
            }
            body {
                padding: 10mm;
            }
        }
    </style>
</head>
<body>

    <div class="controls">
        <label>表示日数：<input type="number" id="rowCount" value="5" min="1" max="15" style="width: 50px;"></label>
        <button onclick="updateRows()" style="padding: 2mm 4mm; cursor: pointer;">日数を更新</button>
        <button class="print-btn" onclick="window.print()">印刷する</button>
    </div>

    <h1>令和<span contenteditable="true">8</span>年度 <span contenteditable="true">〇〇町</span> 旗振り当番表</h1>
    
    <div class="info">
        場所：<span contenteditable="true">〇〇交差点</span> ／ 時間：<span contenteditable="true">7:40 ～ 8:05</span>
    </div>

    <table id="targetTable">
        <thead>
            <tr>
                <th style="width: 30%;">日付</th>
                <th>氏名</th>
                <th>氏名</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>

    <div class="keisho">（敬称略）</div>

    <div class="contact">
        <span contenteditable="true">〇〇町</span> 旗振り担当：<span contenteditable="true">氏名（TEL 090-0000-0000）</span>
    </div>

    <script>
        function updateRows() {
            const count = document.getElementById('rowCount').value;
            const tbody = document.querySelector('#targetTable tbody');
            
            // 現在の内容をクリア
            tbody.innerHTML = '';

            // 指定された数だけ行を作成
            for (let i = 0; i < count; i++) {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><span contenteditable="true"> / （ ）</span></td>
                    <td><span contenteditable="true"> </span></td>
                    <td><span contenteditable="true"> </span></td>
                `;
                tbody.appendChild(tr);
            }
        }

        // 初回読み込み時に実行
        window.onload = updateRows;
    </script>

</body>
</html>
