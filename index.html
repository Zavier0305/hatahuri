<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        @page {
            size: A5 landscape;
            margin: 0; 
        }
        
        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            margin: 0;
            padding: 10mm;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 190mm;
        }

        /* 編集エリアを分かりやすく */
        [contenteditable="true"] {
            outline: 1px dashed #ccc;
            min-height: 1.2em;
            display: inline-block;
            min-width: 20px;
        }

        h1 { font-size: 18pt; margin: 0 0 3mm 0; }
        .info { font-size: 12pt; margin-bottom: 3mm; }

        table {
            border-collapse: collapse;
            width: 100%;
            table-layout: fixed; /* 列の幅を固定 */
        }

        th, td {
            border: 1.5pt solid #000;
            padding: 8pt 4pt;
            font-size: 13pt;
            text-align: center;
            word-break: break-all;
        }

        th { background-color: #eee; }

        .keisho { width: 100%; text-align: right; font-size: 9pt; margin-top: 2mm; }
        .contact { width: 100%; margin-top: 4mm; font-size: 11pt; border: 1pt solid #000; padding: 3mm; box-sizing: border-box; }

        /* 設定パネル（印刷には出ない） */
        .controls {
            margin-bottom: 5mm;
            padding: 10px;
            background: #f0f4f8;
            border: 1px solid #cfd8dc;
            border-radius: 6px;
            display: flex;
            gap: 15px;
            align-items: center;
            font-size: 10pt;
        }

        .print-btn {
            padding: 2mm 6mm;
            cursor: pointer;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
        }

        @media print {
            .controls { display: none; }
            [contenteditable="true"] { outline: none; }
            body { padding: 10mm; }
        }
    </style>
</head>
<body>

    <div class="controls">
        <label>日数：<input type="number" id="rowCount" value="5" min="1" max="12" style="width: 40px;"></label>
        <label>1日の人数：<input type="number" id="colCount" value="2" min="1" max="3" style="width: 40px;"></label>
        <button onclick="updateTable()" style="cursor: pointer;">表を更新</button>
        <button class="print-btn" onclick="window.print()">印刷する</button>
    </div>

    <h1>令和<span contenteditable="true">8</span>年度 <span contenteditable="true">〇〇町</span> 旗振り当番表</h1>
    
    <div class="info">
        場所：<span contenteditable="true">〇〇交差点</span> ／ 時間：<span contenteditable="true">7:40 ～ 8:05</span>
    </div>

    <table id="targetTable">
        <thead>
            <tr id="tableHeader">
                </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>

    <div class="keisho">（敬称略）</div>

    <div class="contact">
        <span contenteditable="true">〇〇町</span> 旗振り担当：<span contenteditable="true">氏名（TEL 090-0000-0000）</span>
    </div>

    <script>
        function updateTable() {
            const rowCount = document.getElementById('rowCount').value;
            const colCount = document.getElementById('colCount').value;
            const thead = document.getElementById('tableHeader');
            const tbody = document.getElementById('tableBody');

            // ヘッダーの生成
            let headerHtml = `<th style="width: 30%;">日付</th>`;
            for (let j = 0; j < colCount; j++) {
                headerHtml += `<th>氏名</th>`;
            }
            thead.innerHTML = headerHtml;

            // 行の生成
            tbody.innerHTML = '';
            for (let i = 0; i < rowCount; i++) {
                const tr = document.createElement('tr');
                let rowHtml = `<td><span contenteditable="true"> / （ ）</span></td>`;
                for (let j = 0; j < colCount; j++) {
                    // 入力しやすいように「氏名」という文字をあらかじめ入れる
                    rowHtml += `<td><span contenteditable="true">氏名</span></td>`;
                }
                tr.innerHTML = rowHtml;
                tbody.appendChild(tr);
            }
        }

        // 起動時に表を作成
        window.onload = updateTable;
    </script>

</body>
</html>
